apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: authentik
  namespace: authentik
spec:
  interval: 1h
  chart:
    spec:
      chart: authentik
      sourceRef:
        kind: HelmRepository
        name: authentik-charts
        namespace: flux-system
  values:
    global:
      envFrom:
        - secretRef:
            name: authentik-bootstrap
    authentik:
      postgresql:
        name: authentik
        user: authentik
        port: 5432

    postgresql:
      enabled: true
      auth:
        database: authentik
        username: authentik
        existingSecret: authentik-bootstrap
        secretKeys:
          userPasswordKey: AUTHENTIK_POSTGRESQL_PASSWORD
      # Persistent storage
      primary:
        persistence:
          enabled: true
          size: 512Mi
          storageClass: local-path
        resources:
          limits:
            cpu: 500m
            memory: 256Mi
          requests:
            cpu: 100m
            memory: 128Mi

    server:
      enabled: true
      config:
        error_reporting:
          enabled: false
          environment: "customer"
      securityContext:
        fsGroup: 1000
        runAsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000
      resources:
        limits:
          cpu: 1000m
          memory: 512Mi
        requests:
          cpu: 200m
          memory: 256Mi

    worker:
      replicaCount: 1
      securityContext:
        fsGroup: 1000
        runAsGroup: 1000
        runAsNonRoot: true
        runAsUser: 1000
      resources:
        limits:
          cpu: 500m
          memory: 256Mi
        requests:
          cpu: 100m
          memory: 128Mi
    
    # Prometheus metrics
    metrics:
      enabled: true
      serviceMonitor:
        enabled: true
        labels:
          release: kube-prometheus-stack
