apiVersion: apps/v1
kind: Deployment
metadata:
  name: poll-bot
  labels:
    app: poll-bot
spec:
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: poll-bot
  template:
    metadata:
      labels:
        app: poll-bot
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: poll-bot
          image: ghcr.io/tomythical/poll-bot:latest
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            seccompProfile:
              type: RuntimeDefault
          ports:
            - containerPort: 8000
              name: http
              protocol: TCP
            - containerPort: 9080
              name: restate
              protocol: TCP
          env:
            - name: WAHA_API_URL
              value: "http://waha.waha.svc.cluster.local:3000"
            - name: POLL_BOT_WEBHOOK_URL
              value: "http://poll-bot.waha.svc.cluster.local/webhook"
            - name: RESULTS_FILE
              value: "/data/results.json"
            - name: RESTATE_SERVER_URL
              value: "http://restate.restate.svc.cluster.local:9071"
            - name: POLL_CHAT_ID
              value: "447443588274@c.us"
            - name: POLL_NAME
              value: "Padel this week?"
            - name: POLL_OPTIONS
              value: "Monday,Tuesday,Wednesday,Thursday,Friday,Saturday,Sunday"
            - name: POLL_SELECTABLE_COUNT
              value: "1"
            - name: POLL_VOTING_SECONDS
              value: "172800"
            - name: PADEL_SLOT_IDX
              value: "0"
            - name: WAHA_API_KEY
              valueFrom:
                secretKeyRef:
                  name: waha-secrets
                  key: WAHA_API_KEY
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 50m
              memory: 64Mi
            limits:
              cpu: 200m
              memory: 128Mi
          volumeMounts:
            - name: data
              mountPath: /data
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: poll-bot-data
