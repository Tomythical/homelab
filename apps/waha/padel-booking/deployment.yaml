apiVersion: apps/v1
kind: Deployment
metadata:
  name: padel-booking
  labels:
    app: padel-booking
spec:
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: padel-booking
  template:
    metadata:
      labels:
        app: padel-booking
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: padel-booking
          image: ghcr.io/tomythical/padel-booking:latest
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
          ports:
            - containerPort: 9080
              name: restate
              protocol: TCP
          env:
            - name: RESTATE_SERVER_URL
              value: "http://restate.restate.svc.cluster.local:9071"
            - name: PADEL_USERNAME
              value: "tomatheickal@hotmail.com"
            - name: PADEL_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: padel-booking-secrets
                  key: PADEL_PASSWORD
          resources:
            requests:
              cpu: 250m
              memory: 512Mi
            limits:
              cpu: 1000m
              memory: 2Gi
          volumeMounts:
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir:
            sizeLimit: 256Mi