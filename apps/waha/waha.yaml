apiVersion: apps/v1
kind: Deployment
metadata:
  name: waha
  labels:
    app: waha
spec:
  replicas: 1
  revisionHistoryLimit: 3
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: waha
  template:
    metadata:
      labels:
        app: waha
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
        - name: waha
          image: devlikeapro/waha:noweb-2026.4.3
          imagePullPolicy: Always
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            runAsNonRoot: true
            runAsUser: 1000
            runAsGroup: 1000
            seccompProfile:
              type: RuntimeDefault
          ports:
            - containerPort: 3000
              name: http
              protocol: TCP
          env:
            - name: WHATSAPP_DEFAULT_ENGINE
              value: "NOWEB"
            - name: TZ
              value: "Europe/London"
            - name: WAHA_PRINT_QR
              value: "False"
            - name: WAHA_DASHBOARD_USERNAME
              value: "admin"
            - name: WAHA_API_KEY
              valueFrom:
                secretKeyRef:
                  name: waha-secrets
                  key: WAHA_API_KEY
            - name: WAHA_DASHBOARD_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: waha-secrets
                  key: WAHA_DASHBOARD_PASSWORD
          livenessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 10
            periodSeconds: 15
          readinessProbe:
            httpGet:
              path: /ping
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
          volumeMounts:
            - name: sessions
              mountPath: /app/.sessions
      volumes:
        - name: sessions
          persistentVolumeClaim:
            claimName: waha-sessions
