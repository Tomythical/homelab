apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: recyclarr-api-keys
spec:
  secretStoreRef:
    kind: SecretStore
    name: doppler-auth-api
  target:
    name: recyclarr-api-keys
    creationPolicy: Owner
  data:
    - secretKey: SONARR_API_KEY
      remoteRef:
        key: SONARR_API_KEY
    - secretKey: RADARR_API_KEY
      remoteRef:
        key: RADARR_API_KEY
