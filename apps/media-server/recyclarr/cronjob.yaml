apiVersion: batch/v1
kind: CronJob
metadata:
  name: recyclarr-sync
  namespace: media
spec:
  schedule: "0 3 * * *"    # daily at 03:00 UTC, change to your preferred cron
  concurrencyPolicy: Forbid
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 1
  jobTemplate:
    spec:
      template:
        spec:
          restartPolicy: OnFailure
          containers:
            - name: recyclarr
              image: ghcr.io/recyclarr/recyclarr:8.6.0
              command: ["/bin/sh", "-c"]
              args:
                - |
                  recyclarr state repair --adopt && recyclarr sync
              env:
                - name: RECYCLARR_CONFIG_DIR
                  value: "/config"
              envFrom:
                - secretRef:
                    name: recyclarr-api-keys
              volumeMounts:
                - name: recyclarr-config
                  mountPath: /config/recyclarr.yml
                  subPath: recyclarr.yml
          volumes:
            - name: recyclarr-config
              configMap:
                name: recyclarr-config
