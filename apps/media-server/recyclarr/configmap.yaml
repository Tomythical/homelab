apiVersion: v1
kind: ConfigMap
metadata:
  name: recyclarr-config
  namespace: media
data:
  recyclarr.yml: |
    sonarr:
      tv:
        base_url: http://sonarr:8989/sonarr
        api_key: !env_var SONARR_API_KEY
        delete_old_custom_formats: true

        include:
          - template: sonarr-quality-definition-series

          - template: sonarr-v4-quality-profile-web-1080p
          - template: sonarr-v4-custom-formats-web-1080p

          - template: sonarr-v4-quality-profile-web-2160p
          - template: sonarr-v4-custom-formats-web-2160p

          - template: sonarr-quality-definition-anime
          - template: sonarr-v4-quality-profile-anime
          - template: sonarr-v4-custom-formats-anime

        custom_formats:
          # HDR Formats
          - trash_ids:
              # Comment out the next line if you and all of your users' setups are fully DV compatible
              - 9b27ab6498ec0f31a3353992e19434ca # DV (w/o HDR fallback)

              # HDR10+ Boost - Uncomment the HDR10+ Boost line if you want to prefer HDR10+ releases
              # DV Boost - Uncomment the DV Boost line if you want to prefer DV releases
              # Uncomment both lines if you want to prefer both (DV HDR10+)
              # - 0c4b99df9206d2cfac3c05ab897dd62a # HDR10+ Boost
              # - 7c3a61a9c6cb04f52f1544be6d44a026 # DV Boost
            assign_scores_to:
              - name: WEB-2160p
              - name: WEB-1080p

          # Optional
          - trash_ids:
              - 32b367365729d530ca1c124a0b180c64 # Bad Dual Groups
              - 82d40da2bc6923f41e14394075dd4b03 # No-RlsGroup
              - e1a997ddb54e3ecbfe06341ad323c458 # Obfuscated
              - 06d66ab109d4d2eddb2794d21526d140 # Retags
              - 1b3994c551cbb92a2c781af061f4ab44 # Scene
            assign_scores_to:
              - name: WEB-2160p
              - name: WEB-1080p

          # Optional SDR
          # Only ever use ONE of the following custom formats:
          # SDR - block ALL SDR releases
          # SDR (no WEBDL) - block UHD/4k Remux and Bluray encode SDR releases, but allow SDR WEB
          - trash_ids:
              - 2016d1676f5ee13a5b7257ff86ac9a93 # SDR
              # - 83304f261cf516bb208c18c54c0adf97 # SDR (no WEBDL)
            assign_scores_to:
              - name: WEB-2160p
              - name: WEB-1080p

          - trash_ids:
              - 026d5aadd1a6b4e550b134cb6c72b3ca # Uncensored
            assign_scores_to:
              - name: Remux-1080p - Anime
                score: 0 # Adjust scoring as desired

          - trash_ids:
              - b2550eb333d27b75833e25b8c2557b38 # 10bit
            assign_scores_to:
              - name: Remux-1080p - Anime
                score: 0 # Adjust scoring as desired

          - trash_ids:
              - 418f50b10f1907201b6cfdf881f467b7 # Anime Dual Audio
            assign_scores_to:
              - name: Remux-1080p - Anime
                score: 0 # Adjust scoring as desired

    radarr:
      movies:
        base_url: http://radarr:7878/radarr
        api_key: !env_var RADARR_API_KEY
        delete_old_custom_formats: true

        include:
          # Comment out any of the following includes to disable them
          - template: radarr-quality-definition-movie
 
          - template: radarr-quality-profile-remux-web-1080p
          - template: radarr-custom-formats-remux-web-1080p

          - template: radarr-quality-profile-remux-web-2160p
          - template: radarr-custom-formats-remux-web-2160p

          - template: radarr-quality-definition-anime
          - template: radarr-quality-profile-anime
          - template: radarr-custom-formats-anime

        quality_profiles:
          - name: WEB-1080p
            qualities:
              - name: WEB 1080p
                qualities:
                  - WEBDL-1080p
                  - WEBRip-1080p
          - name: WEB-2160p
            qualities:
              - name: WEB 2160p
                qualities:
                  - WEBDL-2160p
                  - WEBRip-2160p

        custom_formats:
          # Block ALL Dolby Vision (WEB + Disc)
          - trash_ids:
              - b337d6812e06c200ec9a2d3cfa9d20a7   # DV Boost
              - f700d29429c023a5734505e77daeaea7   # DV (Disk)
              - 923b6abef9b17f937fab56cfcf89e1f1   # DV (w/o HDR fallback)
            assign_scores_to:
              - name: WEB 2160p
                score: -10000

          # Block TrueHD (always forces audio transcode)
          - trash_ids:
              - 3cafb66171b47f226146a0770576870f   # TrueHD
              - 496f355514737f7d83bf7aa4d24f8169   # TrueHD ATMOS
            assign_scores_to:
              - name: WEB 2160p
                score: -10000

          # Mildly penalise DD+ Atmos
          - trash_ids:
              - 1af239278386be2919e1bcee0bde047e   # DD+ ATMOS
            assign_scores_to:
              - name: WEB 2160p
                score: -100

          # 2) Block other DV variants (optional / defensive)
          - trash_ids:
              - f700d29429c023a5734505e77daeaea7 # DV (Disk)
              - b337d6812e06c200ec9a2d3cfa9d20a7 # DV Boost
            assign_scores_to:
              - name: WEB 2160p
                score: -10000

          # 3) Prefer HDR10 / HDR10+ (raise score so these beat other releases)
          - trash_ids:
              - 493b6d1dbec3c3364c59d7607f7e3405 # HDR
              - caa37d0df9c348912df1fb1d88f9273a # HDR10+ Boost
            assign_scores_to:
              - name: WEB 2160p
                score: 500

          # 4) Prefer x265 releases that explicitly say "no HDR/DV" (clean SDR/compatible HEVC)
          - trash_ids:
              - 839bea857ed2c0a8e084f3cbdbd65ecb # x265 (no HDR/DV)
            assign_scores_to:
              - name: WEB 2160p
                score: 250

          # 5) Deprioritise or block Dolby Atmos / DD+ ATMOS if audio transcoding is a concern
          - trash_ids:
              - 1af239278386be2919e1bcee0bde047e # DD+ ATMOS
            assign_scores_to:
              - name: WEB 2160p
                score: -100

          # Optional
          - trash_ids:
              - b6832f586342ef70d9c128d40c07b872 # Bad Dual Groups
              - cc444569854e9de0b084ab2b8b1532b2 # Black and White Editions
              - ae9b7c9ebde1f3bd336a8cbd1ec4c5e5 # No-RlsGroup
              - 7357cf5161efbf8c4d5d0c30b4815ee2 # Obfuscated
              - 5c44f52a8714fdd79bb4d98e2673be1f # Retags
              - f537cf427b64c38c8e36298f657e4828 # Scene
            assign_scores_to:
              - name: WEB 2160p
              - name: WEB 1080p

          # Optional SDR
          # Only ever use ONE of the following custom formats:
          # SDR - block ALL SDR releases
          # SDR (no WEBDL) - block UHD/4k Remux and Bluray encode SDR releases, but allow SDR WEB
          - trash_ids:
              - 9c38ebb7384dada637be8899efa68e6f # SDR
            assign_scores_to:
              - name: WEB 2160p
              - name: WEB 1080p

          - trash_ids:
              - 064af5f084a0a24458cc8ecd3220f93f # Uncensored
            assign_scores_to:
              - name: Remux-1080p - Anime
                score: 0 # Adjust scoring as desired

          - trash_ids:
              - a5d148168c4506b55cf53984107c396e # 10bit
            assign_scores_to:
              - name: Remux-1080p - Anime
                score: 0 # Adjust scoring as desired

          - trash_ids:
              - 4a3b087eea2ce012fcc1ce319259a3be # Anime Dual Audio
            assign_scores_to:
              - name: Remux-1080p - Anime
                score: 0 # Adjust scoring as desired
