apiVersion: v1
kind: ConfigMap
metadata:
  name: recyclarr-config
  namespace: media
data:
  recyclarr.yml: |
    sonarr:
      tv:
        base_url: http://sonarr:8989/sonarr
        api_key: !env_var SONARR_API_KEY
        delete_old_custom_formats: true

        quality_definition:
          type: series

        quality_profiles:
          - name: WEB-1080p
            upgrade:
              allowed: true
              until_quality: WEB-1080p
            qualities:
              - name: WEB-1080p
                qualities:
                  - WEBDL-1080p
                  - WEBRip-1080p
          - name: WEB-2160p
            upgrade:
              allowed: true
              until_quality: WEB-2160p
            qualities:
              - name: WEB-2160p
                qualities:
                  - WEBDL-2160p
                  - WEBRip-2160p

        custom_formats:
          - trash_ids:
              - 7c3a61a9c6cb04f52f1544be6d44a026   # DV Boost
              - ef4963043b0987f8485bc9106f16db38   # DV (Disk)
              - 0c4b99df9206d2cfac3c05ab897dd62a   # HDR10PlusBoost
              - 4232a509ce60c4e208d13825b7c06264   # DD+ ATMOS
            assign_scores_to:
              - name: WEB-2160p
                score: -10000
              - name: WEB-1080p
                score: -10000

          - trash_ids:
              - 1808e4b9cee74e064dfae3f1db99dbfe   # TrueHD
              - 0d7824bb924701997f874e7ff7d4844a   # TrueHD ATMOS
            assign_scores_to:
              - name: WEB-2160p
                score: -10000
              - name: WEB-1080p
                score: -10000

          - trash_ids:
              - 505d871304820ba7106b693be6fe4a9e # HDR
              - 9b27ab6498ec0f31a3353992e19434ca   # DV (w/o HDR fallback)
              - e6258996055b9fbab7e9cb2f75819294  # Web Tier 01
            assign_scores_to:
              - name: WEB-2160p
                score: 1000
              - name: WEB-1080p
                score: 1000

          - trash_ids:
              - 9b64dff695c2115facf1b6ea59c9bd07 # x265 (no HDR/DV)
            assign_scores_to:
              - name: WEB-2160p
                score: 100
              - name: WEB-1080p
                score: 100

          - trash_ids:
              - 2016d1676f5ee13a5b7257ff86ac9a93 # SDR
            assign_scores_to:
              - name: WEB-1080p
                score: 100

          - trash_ids:
              - 32b367365729d530ca1c124a0b180c64 # Bad Dual Groups
              - 82d40da2bc6923f41e14394075dd4b03 # No-RlsGroup
              - e1a997ddb54e3ecbfe06341ad323c458 # Obfuscated
              - 06d66ab109d4d2eddb2794d21526d140 # Retags
              - 1b3994c551cbb92a2c781af061f4ab44 # Scene
            assign_scores_to:
              - name: WEB-2160p
                score: -1000
              - name: WEB-1080p
                score: -1000

    radarr:
      movies:
        base_url: http://radarr:7878/radarr
        api_key: !env_var RADARR_API_KEY
        delete_old_custom_formats: true

        quality_definition:
          type: movie

        quality_profiles:
          - name: WEB-1080p
            upgrade:
              allowed: true
              until_quality: WEB-1080p
            qualities:
              - name: WEB-1080p
                qualities:
                  - WEBDL-1080p
                  - WEBRip-1080p
          - name: WEB-2160p
            upgrade:
              allowed: true
              until_quality: WEB-2160p
            qualities:
              - name: WEB-2160p
                qualities:
                  - WEBDL-2160p
                  - WEBRip-2160p

        custom_formats:
          # Block ALL Dolby Vision (WEB + Disc)
          - trash_ids:
              - b337d6812e06c200ec9a2d3cfa9d20a7   # DV Boost
              - f700d29429c023a5734505e77daeaea7   # DV (Disk)
              - caa37d0df9c348912df1fb1d88f9273a   # HDR10PlusBoost
              - 1af239278386be2919e1bcee0bde047e   # DD+ ATMOS
            assign_scores_to:
              - name: WEB-2160p
                score: -10000
              - name: WEB-1080p
                score: -10000

          # Block TrueHD (always forces audio transcode)
          - trash_ids:
              - 3cafb66171b47f226146a0770576870f   # TrueHD
              - 496f355514737f7d83bf7aa4d24f8169   # TrueHD ATMOS
            assign_scores_to:
              - name: WEB-2160p
                score: -10000
              - name: WEB-1080p
                score: -10000

          # 3) Prefer HDR10 / HDR10+ (raise score so these beat other releases)
          - trash_ids:
              - 493b6d1dbec3c3364c59d7607f7e3405 # HDR
              - 923b6abef9b17f937fab56cfcf89e1f1   # DV (w/o HDR fallback)
              - c20f169ef63c5f40c2def54abaf4438e  # Web Tier 01
            assign_scores_to:
              - name: WEB-2160p
                score: 1000
              - name: WEB-1080p
                score: 1000

          # 4) Prefer x265 releases that explicitly say "no HDR/DV" (clean SDR/compatible HEVC)
          - trash_ids:
              - 839bea857ed2c0a8e084f3cbdbd65ecb # x265 (no HDR/DV)
            assign_scores_to:
              - name: WEB-2160p
                score: 250
              - name: WEB-1080p
                score: 250

          - trash_ids:
              - 9c38ebb7384dada637be8899efa68e6f # SDR
            assign_scores_to:
              - name: WEB-1080p
                score: 100

          # Optional
          - trash_ids:
              - b6832f586342ef70d9c128d40c07b872 # Bad Dual Groups
              - cc444569854e9de0b084ab2b8b1532b2 # Black and White Editions
              - ae9b7c9ebde1f3bd336a8cbd1ec4c5e5 # No-RlsGroup
              - 7357cf5161efbf8c4d5d0c30b4815ee2 # Obfuscated
              - 5c44f52a8714fdd79bb4d98e2673be1f # Retags
              - f537cf427b64c38c8e36298f657e4828 # Scene
            assign_scores_to:
              - name: WEB-2160p
                score: -1000
              - name: WEB-1080p
                score: -1000
