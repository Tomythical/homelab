---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: streamystats-db
  namespace: media-server
  labels:
    app: streamystats-db
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: streamystats-db
  template:
    metadata:
      labels:
        app: streamystats-db
    spec:
      securityContext:
        fsGroup: 1000
      containers:
        - name: vectorchord
          image: tensorchord/vchord-postgres:pg17-v0.4.1
          args: ["-c", "log_checkpoints=off"]
          env:
            - name: POSTGRES_USER
              valueFrom:
                secretKeyRef:
                  name: streamystats-postgres
                  key: POSTGRES_USER
            - name: POSTGRES_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: streamystats-postgres
                  key: POSTGRES_PASSWORD
            - name: POSTGRES_DB
              valueFrom:
                secretKeyRef:
                  name: streamystats-postgres
                  key: POSTGRES_DB
            - name: POSTGRES_HOST_AUTH_METHOD
              value: scram-sha-256
            - name: POSTGRES_INITDB_ARGS
              value: --auth-host=scram-sha-256
          ports:
            - containerPort: 5432
              name: postgres
          volumeMounts:
            - name: db-data
              mountPath: /var/lib/postgresql/data
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}
            initialDelaySeconds: 30
            periodSeconds: 10
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}
            initialDelaySeconds: 5
            periodSeconds: 10
      volumes:
        - name: db-data
          persistentVolumeClaim:
            claimName: streamystats-db-pvc
