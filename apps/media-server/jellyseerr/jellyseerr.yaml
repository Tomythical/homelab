apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: seerr
spec:
  interval: 1h
  chartRef:
    kind: OCIRepository
    name: seerr
    namespace: flux-system
  values:
    fullnameOverride: seerr
    image:
      repository: seerr-team/seerr
      tag: v3.1.0
    config:
      persistence:
        size: 1Gi
        accessModes:
          - ReadWriteOnce
        storageClass: local-path
    service:
      type: ClusterIP
    podSecurityContext:
      fsGroup: 1000
      fsGroupChangePolicy: OnRootMismatch
    securityContext:
      allowPrivilegeEscalation: false
      capabilities:
        drop:
          - ALL
      readOnlyRootFilesystem: false
      runAsNonRoot: true
      privileged: false
      runAsUser: 1000
      runAsGroup: 1000
      seccompProfile:
        type: RuntimeDefault
  postRenderers:
    - kustomize:
        patches:
          - target:
              version: v1
              kind: Service
              name: jellyseerr
            patch: |
              - op: add
                path: /metadata/annotations/tailscale.com~1expose
                value: "true"
