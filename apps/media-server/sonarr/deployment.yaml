apiVersion: apps/v1
kind: Deployment
metadata:
  name: sonarr
  namespace: media-server
  labels:
    app: sonarr
spec:
  replicas: 1
  strategy:
    type: Recreate
  selector:
    matchLabels:
      app: sonarr
  template:
    metadata:
      labels:
        app: sonarr
    spec:
      # Pod-level security so ownership/permissions are consistent across mounts
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      initContainers:
        # Single authoritative init container to create dirs and set ownership on the PVC root
        - name: init-media-dirs
          image: busybox
          securityContext:
            runAsUser: 0
          command:
            - sh
            - -c
            - |
              set -e
              mkdir -p /downloads/sabnzbd/complete
              mkdir -p /downloads/sabnzbd/incomplete
              mkdir -p /data/media/tv /data/media/movies
              chown -R 1000:1000 /data
              chmod -R 775 /data
          volumeMounts:
            - name: mediaserver-volume
              mountPath: /data
        # existing config init container (keeps your current behaviour)
        - name: config-sonarr
          image: docker.io/ubuntu:groovy
          command:
            - /init-sonarr/init-sonarr.sh
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
          volumeMounts:
            - mountPath: /init-sonarr
              name: init-files-sonarr
            - mountPath: /sonarr-config
              name: pvc-sonarr-config
      containers:
        - name: k8s-mediaserver
          image: docker.io/linuxserver/sonarr:latest
          imagePullPolicy: Always
          envFrom:
            - configMapRef:
                name: sonarr-config
          ports:
            - name: sonarr-port
              containerPort: 8989
              protocol: TCP
          readinessProbe:
            httpGet:
              path: /sonarr/ping
              port: 8989
              scheme: HTTP
            initialDelaySeconds: 10
            periodSeconds: 20
            timeoutSeconds: 20
          # Container-level security ensures process runs as the correct UID/GID
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
          volumeMounts:
            - name: pvc-sonarr-config
              mountPath: /config
            # single shared mount at /data (no subPath)
            - name: mediaserver-volume
              mountPath: /data
      volumes:
        - name: mediaserver-volume
          persistentVolumeClaim:
            claimName: mediaserver-rwo-pvc
        - name: pvc-sonarr-config
          persistentVolumeClaim:
            claimName: pvc-sonarr-config
        - name: init-files-sonarr
          configMap:
            name: init-sonarr-cm
            defaultMode: 493
