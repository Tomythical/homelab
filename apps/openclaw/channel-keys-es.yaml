apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: openclaw-channel-keys
spec:
  secretStoreRef:
    kind: SecretStore
    name: doppler-auth-api
  target:
    name: openclaw-channel-keys
    creationPolicy: Owner
  data:
    - secretKey: TELEGRAM_BOT_TOKEN
      remoteRef:
        key: TELEGRAM_BOT_TOKEN
