apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: hermes-secrets
spec:
  secretStoreRef:
    kind: ClusterSecretStore
    name: doppler-auth-api
  target:
    name: hermes-secrets
    creationPolicy: Owner
  data:
    - secretKey: OPENROUTER_API_KEY
      remoteRef:
        key: HERMES_OPENROUTER_API_KEY
    - secretKey: HERMES_DASHBOARD_BASIC_AUTH_USERNAME
      remoteRef:
        key: HERMES_DASHBOARD_BASIC_AUTH_USERNAME
    - secretKey: HERMES_DASHBOARD_BASIC_AUTH_PASSWORD
      remoteRef:
        key: HERMES_DASHBOARD_BASIC_AUTH_PASSWORD