apiVersion: apps/v1
kind: Deployment
metadata:
  name: journiv-app
spec:
  replicas: 1
  selector:
    matchLabels:
      app: journiv-app
  template:
    metadata:
      labels:
        app: journiv-app
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      initContainers:
      - name: init-permissions
        image: busybox
        securityContext:
          runAsUser: 0
        command: ["sh", "-c", "chown -R 1000:1000 /data && chmod -R 775 /data"]
        volumeMounts:
        - name: journiv-data
          mountPath: /data
          subPath: app
      containers:
      - name: journiv-app
        image: swalabtech/journiv-app:0.1.0-beta.21
        ports:
        - containerPort: 8000
        env:
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: journiv-secrets
              key: SECRET_KEY
        - name: DB_DRIVER
          value: "postgresql"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: journiv-secrets
              key: DATABASE_URL
        - name: REDIS_URL
          value: "redis://valkey:6379/0"
        - name: CELERY_BROKER_URL
          value: "redis://valkey:6379/0"
        - name: CELERY_RESULT_BACKEND
          value: "redis://valkey:6379/0"
        - name: RATE_LIMIT_STORAGE_URI
          value: "redis://valkey:6379/1"
        - name: SERVICE_ROLE
          value: "app"
        - name: ENVIRONMENT
          value: "production"
        - name: DISABLE_SIGNUP
          value: "false"
        - name: DEBUG
          value: "true"
        - name: LOG_LEVEL
          value: "DEBUG"
        - name: DOMAIN_NAME
          value: "*.ts.net"
        volumeMounts:
        - name: journiv-data
          mountPath: /data
          subPath: app
      volumes:
      - name: journiv-data
        persistentVolumeClaim:
          claimName: journiv-data
