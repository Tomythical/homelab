apiVersion: apps/v1
kind: Deployment
metadata:
  name: celery-beat
spec:
  replicas: 1
  selector:
    matchLabels:
      app: celery-beat
  template:
    metadata:
      labels:
        app: celery-beat
    spec:
      securityContext:
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      initContainers:
      - name: init-permissions
        image: busybox
        securityContext:
          runAsUser: 0
        command: ["sh", "-c", "chown -R 1000:1000 /data && chmod -R 775 /data"]
        volumeMounts:
        - name: journiv-data
          mountPath: /data
          subPath: app
      containers:
      - name: celery-beat
        image: swalabtech/journiv-app:0.1.0-beta.21
        env:
        - name: SECRET_KEY
          valueFrom:
            secretKeyRef:
              name: journiv-secrets
              key: SECRET_KEY
        - name: DB_DRIVER
          value: "postgres"
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: journiv-secrets
              key: DATABASE_URL
        - name: REDIS_URL
          value: "redis://valkey:6379/0"
        - name: CELERY_BROKER_URL
          value: "redis://valkey:6379/0"
        - name: CELERY_RESULT_BACKEND
          value: "redis://valkey:6379/0"
        - name: REDBEAT_REDIS_URL
          value: "redis://valkey:6379/2"
        - name: SERVICE_ROLE
          value: "celery-beat"
        - name: ENVIRONMENT
          value: "production"
        volumeMounts:
        - name: journiv-data
          mountPath: /data
          subPath: app
      volumes:
      - name: journiv-data
        persistentVolumeClaim:
          claimName: journiv-data
